{% if ganhadores %}
<style>
    .winners-section {
        background: #fff;
        padding: 24px 32px 60px 32px;
        border-top: 1px solid #e8e8e8;
    }


    .winners-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .winners-title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 38px;
        font-weight: 800;
        color: #111;
        margin-bottom: 8px;
        letter-spacing: -1.5px;
        text-transform: none;
    }


    .winners-subtitle {
        font-size: 14px;
        color: #888;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .winners-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        width: 100%;
        padding: 0 2vw;
        margin: 0 auto;
    }


    .winner-card {
        aspect-ratio: 4/5;
        border-radius: 12px;

        overflow: hidden;
        position: relative;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background: linear-gradient(135deg, #0d5c24 0%, #0a3d1a 100%);
        border: 2.5px solid transparent;
        /* Efeito de borda degradê simulado */
        background-clip: padding-box;
    }

    .winner-card::before {
        content: '';
        position: absolute;
        top: -2.5px;
        bottom: -2.5px;
        left: -2.5px;
        right: -2.5px;
        background: linear-gradient(to bottom right, #facc15, #0e6e2a);
        z-index: -1;
        border-radius: 14px;
    }

    .winner-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .winner-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }

    .winner-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 60%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
        z-index: 2;
    }

    .winner-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 9px;
        font-weight: 800;
        color: #facc15;
        text-transform: uppercase;
        z-index: 3;
    }

    .winner-trophy {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 16px;
        z-index: 3;
    }

    .winner-info {
        position: absolute;
        bottom: 14px;
        left: 14px;
        right: 14px;
        z-index: 3;
    }

    .winner-name {
        font-size: 14px;
        font-weight: 800;
        color: #fff;
        display: block;
        margin-bottom: 2px;
    }

    .winner-city {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 500;
    }

    @media (max-width: 1024px) {
        .winners-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 640px) {
        .winners-grid {
            grid-template-columns: repeat(2, 1fr);
            padding: 0 16px;
        }

        .winners-title {
            font-size: 28px;
        }
    }
</style>

<section class="winners-section">
    <div class="winners-header">
        <h2 class="winners-title">Ganhadores da Semana</h2>
        <p class="winners-subtitle">
            Semana de {{ ganhadores.0.data_inicio_semana|date:"d/m" }} a {{ ganhadores.0.data_fim_semana|date:"d/m" }}
        </p>
    </div>

    <div class="winners-grid">
        {% for ganhador in ganhadores %}
        <div class="winner-card">
            {% if ganhador.foto %}
            <img src="{{ ganhador.foto.url }}" alt="{{ ganhador.nome }}" class="winner-img">
            {% endif %}
        </div>

        {% endfor %}
    </div>
</section>
{% endif %}
