<audio id="mainAudio" preload="auto">
    <source src="https://8036.brasilstream.com.br/stream" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('mainAudio');
    const statusTexts = document.querySelectorAll('.js-status-text');
    const playIcons = document.querySelectorAll('.js-play-icon');
    const pauseIcons = document.querySelectorAll('.js-pause-icon');
    const volFill = document.getElementById('volFill');

    let isPlaying = false;

    const INITIAL_VOLUME = 0.8;
    audio.volume = INITIAL_VOLUME;
    if (volFill) volFill.style.width = (INITIAL_VOLUME * 100) + '%';

    function setAllStatus(text) {
        statusTexts.forEach(el => el.innerText = text);
    }

    function togglePlay() {
        if (!audio) return;

        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            updateUI(false);
        } else {
            setAllStatus("Conectando...");
            audio.load();
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updateUI(true);
                }).catch(error => {
                    console.error("Erro ao reproduzir:", error);
                    setAllStatus("Erro ao carregar");
                    isPlaying = false;
                    updateUI(false);
                });
            }
        }
    }

    function updateUI(playing) {
        if (playing) {
            playIcons.forEach(el => el.style.display = "none");
            pauseIcons.forEach(el => el.style.display = "block");
        } else {
            playIcons.forEach(el => el.style.display = "block");
            pauseIcons.forEach(el => el.style.display = "none");
            setAllStatus("No Ar");
        }
    }

    const volTrack = document.querySelector('.vol-track');
    if (volTrack && volFill) {
        volTrack.addEventListener('click', (e) => {
            const rect = volTrack.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const vol = Math.max(0, Math.min(1, x / width));
            audio.volume = vol;
            volFill.style.width = (vol * 100) + '%';
        });
    }

    function changeVolume(delta) {
        if (!audio) return;
        const newVol = Math.max(0, Math.min(1, audio.volume + delta));
        audio.volume = newVol;
        if (volFill) volFill.style.width = (newVol * 100) + '%';
    }

    function normalizeRadioText(text) {
        if (!text) return "";
        
        const mapa = {
            '~a': 'ã', '~o': 'õ', '~e': 'ê', '~c': 'ç', '~n': 'ñ', 
            '~A': 'Ã', '~O': 'Õ', '~E': 'Ê', '~C': 'Ç', '~N': 'Ñ',
            '´a': 'á', '´e': 'é', '´i': 'í', '´o': 'ó', '´u': 'ú',
            '´A': 'Á', '´E': 'É', '´I': 'Í', '´O': 'Ó', '´U': 'Ú',
            '\'a': 'á', '\'e': 'é', '\'i': 'í', '\'o': 'ó', '\'u': 'ú',
            '\'A': 'Á', '\'E': 'É', '\'I': 'Í', '\'O': 'Ó', '\'U': 'Ú',
            '^a': 'â', '^e': 'ê', '^i': 'î', '^o': 'ô', '^u': 'û',
            '^A': 'Â', '^E': 'Ê', '^I': 'Î', '^O': 'Ô', '^U': 'Û',
            '`a': 'à', '`e': 'è', '`i': 'ì', '`o': 'ò', '`u': 'ù',
            '&amp;': '&', '&#039;': "'", '&quot;': '"'
        };

        try {
            if (/[\u00c0-\u00ff]/.test(text)) {
                text = decodeURIComponent(escape(text));
            }
        } catch (e) { }

        let clean = text.trim();
        for (const [erro, acerto] of Object.entries(mapa)) {
            clean = clean.split(erro).join(acerto);
        }

        clean = clean.replace(/<[^>]*>?/gm, '');

        if (clean === clean.toUpperCase() && clean.length > 5) {
            clean = clean.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
        }

        return clean.trim();
    }

    async function updateMetadata() {
        if (!isPlaying) return;
        
        let nomeDaMusica = "";
        
        try {
            const response = await fetch('/api/musica/');
            const data = await response.json();
            if (data.musica && !data.musica.includes("Sintonize")) {
                nomeDaMusica = data.musica;
            }
        } catch (e) { }

        if (!nomeDaMusica) {
            try {
                const url = 'https://api.brasilstream.com.br/musica_agora/id:1185863148;';
                const response = await fetch(url);
                nomeDaMusica = await response.text();
            } catch (e) { }
        }
            
        if (isPlaying) {
            const finalNode = normalizeRadioText(nomeDaMusica);
            if (finalNode && finalNode.length > 3) {
                setAllStatus(finalNode);
            } else {
                setAllStatus("Ao Vivo");
            }
        }
    }

    setInterval(updateMetadata, 50000);

    let waitingTimer = null;

    if (audio) {
        audio.onwaiting = function () {
            if (!isPlaying) return;
            waitingTimer = setTimeout(() => {
                if (isPlaying) setAllStatus("Conectando...");
            }, 2500);
        };

        audio.onplaying = function () {
            if (waitingTimer) {
                clearTimeout(waitingTimer);
                waitingTimer = null;
            }
            if (isPlaying) {
                updateMetadata();
            }
        };

        audio.onerror = function () {
            if (waitingTimer) clearTimeout(waitingTimer);
            setAllStatus("Erro na Conexão");
            updateUI(false);
            isPlaying = false;
        };
    }
</script>
