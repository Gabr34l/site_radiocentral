<audio id="mainAudio" preload="auto">
    <source src="https://8036.brasilstream.com.br/stream" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('mainAudio');
    const statusTexts = document.querySelectorAll('.js-status-text');
    const playIcons = document.querySelectorAll('.js-play-icon');
    const pauseIcons = document.querySelectorAll('.js-pause-icon');
    const volFill = document.getElementById('volFill');

    let isPlaying = false;

    // ── CONTROLE DE VOLUME ─────────────────────────────────────────────────
    // iOS Safari bloqueia audio.volume por design (sempre retorna 1.0).
    // Solução: Web Audio API com GainNode — o iOS permite controle de gain
    // por software, que efetivamente muda o volume do áudio antes de chegar
    // ao hardware. Funciona em todos os navegadores modernos.
    const INITIAL_VOLUME = 0.8;
    let currentVolume = INITIAL_VOLUME;
    let audioCtx = null;
    let gainNode = null;

    // Inicializa o Web Audio API (DEVE ser chamado dentro de um evento de
    // interação do usuário — exigência do iOS/Safari para autoplay policy)
    function initAudioContext() {
        if (audioCtx) {
            // Resume o contexto se estiver suspenso (acontece no iOS após inatividade)
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return;
        }
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            gainNode = audioCtx.createGain();
            gainNode.gain.value = currentVolume;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        } catch(e) {
            console.warn('Web Audio API indisponível:', e);
        }
    }

    // Inicializa a barra visual no carregamento
    if (volFill) volFill.style.width = (INITIAL_VOLUME * 100) + '%';

    function setAllStatus(text) {
        statusTexts.forEach(el => el.innerText = text);
    }

    function togglePlay() {
        if (!audio) return;

        // Inicializa o Web Audio API na 1ª interação (obrigatório no iOS)
        initAudioContext();

        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            updateUI(false);
        } else {
            setAllStatus("Conectado");
            audio.load();
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updateUI(true);
                }).catch(error => {
                    console.error("Erro ao reproduzir:", error);
                    setAllStatus("Erro ao carregar");
                    isPlaying = false;
                    updateUI(false);
                });
            }
        }
    }

    function updateUI(playing) {
        if (playing) {
            playIcons.forEach(el => el.style.display = "none");
            pauseIcons.forEach(el => el.style.display = "block");
        } else {
            playIcons.forEach(el => el.style.display = "block");
            pauseIcons.forEach(el => el.style.display = "none");
            setAllStatus("No Ar");
        }
    }

    // Aplica o volume via GainNode (iOS) e audio.volume (desktop/Android)
    function applyVolume(vol) {
        currentVolume = Math.max(0, Math.min(1, vol));

        // GainNode: funciona no iOS (Web Audio API não é bloqueada pela Apple)
        if (gainNode) gainNode.gain.value = currentVolume;

        // audio.volume: funciona no desktop e Android (ignorado no iOS)
        try { audio.volume = currentVolume; } catch(e) {}

        if (volFill) volFill.style.width = (currentVolume * 100) + '%';
    }

    // Barra de volume clicável (desktop)
    const volTrack = document.querySelector('.vol-track');
    if (volTrack && volFill) {
        // Suporte a clique (desktop/Android)
        volTrack.addEventListener('click', (e) => {
            const rect = volTrack.getBoundingClientRect();
            const x = e.clientX - rect.left;
            applyVolume(x / rect.width);
        });

        // Suporte a toque (iOS/mobile) — usa changedTouches para obter posição
        volTrack.addEventListener('touchend', (e) => {
            e.preventDefault(); // Evita que o 'click' dispare em seguida
            const rect = volTrack.getBoundingClientRect();
            const x = e.changedTouches[0].clientX - rect.left;
            applyVolume(x / rect.width);
        }, { passive: false });
    }

    // Botões + e -: usa currentVolume (nunca audio.volume) para evitar o bug do iOS
    function changeVolume(delta) {
        if (!audio) return;
        applyVolume(currentVolume + delta);
    }

    function normalizeRadioText(text) {
        if (!text) return "";

        const mapa = {
            '~a': 'ã', '~o': 'õ', '~e': 'ê', '~c': 'ç', '~n': 'ñ',
            '~A': 'Ã', '~O': 'Õ', '~E': 'Ê', '~C': 'Ç', '~N': 'Ñ',
            '´a': 'á', '´e': 'é', '´i': 'í', '´o': 'ó', '´u': 'ú',
            '´A': 'Á', '´E': 'É', '´I': 'Í', '´O': 'Ó', '´U': 'Ú',
            '\'a': 'á', '\'e': 'é', '\'i': 'í', '\'o': 'ó', '\'u': 'ú',
            '\'A': 'Á', '\'E': 'É', '\'I': 'Í', '\'O': 'Ó', '\'U': 'Ú',
            '^a': 'â', '^e': 'ê', '^i': 'î', '^o': 'ô', '^u': 'û',
            '^A': 'Â', '^E': 'Ê', '^I': 'Î', '^O': 'Ô', '^U': 'Û',
            '`a': 'à', '`e': 'è', '`i': 'ì', '`o': 'ò', '`u': 'ù',
            '&amp;': '&', '&#039;': "'", '&quot;': '"'
        };

        try {
            if (/[\u00c0-\u00ff]/.test(text)) {
                text = decodeURIComponent(escape(text));
            }
        } catch (e) { }

        let clean = text.trim();
        for (const [erro, acerto] of Object.entries(mapa)) {
            clean = clean.split(erro).join(acerto);
        }

        clean = clean.replace(/<[^>]*>?/gm, '');

        if (clean === clean.toUpperCase() && clean.length > 5) {
            clean = clean.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
        }

        return clean.trim();
    }

    async function updateMetadata() {
        if (!isPlaying) return;

        let nomeDaMusica = "";

        try {
            const response = await fetch('/api/musica/');
            const data = await response.json();
            if (data.musica && !data.musica.includes("Sintonize")) {
                nomeDaMusica = data.musica;
            }
        } catch (e) { }

        if (!nomeDaMusica) {
            try {
                const url = 'https://api.brasilstream.com.br/musica_agora/id:1185863148;';
                const response = await fetch(url);
                nomeDaMusica = await response.text();
            } catch (e) { }
        }

        if (isPlaying) {
            const finalNode = normalizeRadioText(nomeDaMusica);
            if (finalNode && finalNode.length > 3) {
                setAllStatus(finalNode);
            } else {
                setAllStatus("Ao Vivo");
            }
        }
    }

    setInterval(updateMetadata, 50000);

    let waitingTimer = null;

    if (audio) {
        audio.onwaiting = function () {
            if (!isPlaying) return;
            waitingTimer = setTimeout(() => {
                if (isPlaying) setAllStatus("Conectando...");
            }, 2500);
        };

        audio.onplaying = function () {
            if (waitingTimer) {
                clearTimeout(waitingTimer);
                waitingTimer = null;
            }
            if (isPlaying) {
                updateMetadata();
            }
        };

        audio.onerror = function () {
            if (waitingTimer) clearTimeout(waitingTimer);
            setAllStatus("Erro na Conexão");
            updateUI(false);
            isPlaying = false;
        };
    }
</script>
