<audio id="mainAudio" preload="auto">
    <source src="https://8036.brasilstream.com.br/stream" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('mainAudio');
    const statusTexts = document.querySelectorAll('.js-status-text');
    const playIcons = document.querySelectorAll('.js-play-icon');
    const pauseIcons = document.querySelectorAll('.js-pause-icon');
    const volFill = document.getElementById('volFill');

    let isPlaying = false;

    // iOS Safari ignora audio.volume (Г© somente leitura no iOS).
    // Por isso rastreamos o volume na nossa prГіpria variГЎvel,
    // nunca lendo de volta audio.volume como fonte da verdade.
    const INITIAL_VOLUME = 0.8;
    let currentVolume = INITIAL_VOLUME;
    try { audio.volume = INITIAL_VOLUME; } catch(e) {}
    if (volFill) volFill.style.width = (INITIAL_VOLUME * 100) + '%';

    function setAllStatus(text) {
        statusTexts.forEach(el => el.innerText = text);
    }

    function togglePlay() {
        if (!audio) return;

        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            updateUI(false);
        } else {
            setAllStatus("Conectado");
            audio.load();
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updateUI(true);
                }).catch(error => {
                    console.error("Erro ao reproduzir:", error);
                    setAllStatus("Erro ao carregar");
                    isPlaying = false;
                    updateUI(false);
                });
            }
        }
    }

    function updateUI(playing) {
        if (playing) {
            playIcons.forEach(el => el.style.display = "none");
            pauseIcons.forEach(el => el.style.display = "block");
        } else {
            playIcons.forEach(el => el.style.display = "block");
            pauseIcons.forEach(el => el.style.display = "none");
            setAllStatus("No Ar");
        }
    }

    // FunГ§ГЈo auxiliar para aplicar o volume na barra e no ГЎudio
    function applyVolume(vol) {
        currentVolume = Math.max(0, Math.min(1, vol));
        try { audio.volume = currentVolume; } catch(e) {} // Ignorado no iOS
        if (volFill) volFill.style.width = (currentVolume * 100) + '%';
    }

    // Barra de volume clicГЎvel (desktop)
    const volTrack = document.querySelector('.vol-track');
    if (volTrack && volFill) {
        // Suporte a clique (desktop/Android)
        volTrack.addEventListener('click', (e) => {
            const rect = volTrack.getBoundingClientRect();
            const x = e.clientX - rect.left;
            applyVolume(x / rect.width);
        });

        // Suporte a toque (iOS/mobile) вЂ” usa changedTouches para obter posiГ§ГЈo
        volTrack.addEventListener('touchend', (e) => {
            e.preventDefault(); // Evita que o 'click' dispare em seguida
            const rect = volTrack.getBoundingClientRect();
            const x = e.changedTouches[0].clientX - rect.left;
            applyVolume(x / rect.width);
        }, { passive: false });
    }

    // BotГµes + e -: usa currentVolume (nunca audio.volume) para evitar o bug do iOS
    function changeVolume(delta) {
        if (!audio) return;
        applyVolume(currentVolume + delta);
    }

    function normalizeRadioText(text) {
        if (!text) return "";

        const mapa = {
            '~a': 'ГЈ', '~o': 'Гµ', '~e': 'ГЄ', '~c': 'Г§', '~n': 'Г±',
            '~A': 'Гѓ', '~O': 'Г•', '~E': 'ГЉ', '~C': 'Г‡', '~N': 'Г‘',
            'Вґa': 'ГЎ', 'Вґe': 'Г©', 'Вґi': 'Г­', 'Вґo': 'Гі', 'Вґu': 'Гє',
            'ВґA': 'ГЃ', 'ВґE': 'Г‰', 'ВґI': 'ГЌ', 'ВґO': 'Г“', 'ВґU': 'Гљ',
            '\'a': 'ГЎ', '\'e': 'Г©', '\'i': 'Г­', '\'o': 'Гі', '\'u': 'Гє',
            '\'A': 'ГЃ', '\'E': 'Г‰', '\'I': 'ГЌ', '\'O': 'Г“', '\'U': 'Гљ',
            '^a': 'Гў', '^e': 'ГЄ', '^i': 'Г®', '^o': 'Гґ', '^u': 'Г»',
            '^A': 'Г‚', '^E': 'ГЉ', '^I': 'ГЋ', '^O': 'Г”', '^U': 'Г›',
            '`a': 'Г ', '`e': 'ГЁ', '`i': 'Г¬', '`o': 'ГІ', '`u': 'Г№',
            '&amp;': '&', '&#039;': "'", '&quot;': '"'
        };

        try {
            if (/[\u00c0-\u00ff]/.test(text)) {
                text = decodeURIComponent(escape(text));
            }
        } catch (e) { }

        let clean = text.trim();
        for (const [erro, acerto] of Object.entries(mapa)) {
            clean = clean.split(erro).join(acerto);
        }

        clean = clean.replace(/<[^>]*>?/gm, '');

        if (clean === clean.toUpperCase() && clean.length > 5) {
            clean = clean.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
        }

        return clean.trim();
    }

    async function updateMetadata() {
        if (!isPlaying) return;

        let nomeDaMusica = "";

        try {
            const response = await fetch('/api/musica/');
            const data = await response.json();
            if (data.musica && !data.musica.includes("Sintonize")) {
                nomeDaMusica = data.musica;
            }
        } catch (e) { }

        if (!nomeDaMusica) {
            try {
                const url = 'https://api.brasilstream.com.br/musica_agora/id:1185863148;';
                const response = await fetch(url);
                nomeDaMusica = await response.text();
            } catch (e) { }
        }

        if (isPlaying) {
            const finalNode = normalizeRadioText(nomeDaMusica);
            if (finalNode && finalNode.length > 3) {
                setAllStatus(finalNode);
            } else {
                setAllStatus("Ao Vivo");
            }
        }
    }

    setInterval(updateMetadata, 50000);

    let waitingTimer = null;

    if (audio) {
        audio.onwaiting = function () {
            if (!isPlaying) return;
            waitingTimer = setTimeout(() => {
                if (isPlaying) setAllStatus("Conectando...");
            }, 2500);
        };

        audio.onplaying = function () {
            if (waitingTimer) {
                clearTimeout(waitingTimer);
                waitingTimer = null;
            }
            if (isPlaying) {
                updateMetadata();
            }
        };

        audio.onerror = function () {
            if (waitingTimer) clearTimeout(waitingTimer);
            setAllStatus("Erro na ConexГЈo");
            updateUI(false);
            isPlaying = false;
        };
    }
</script>
