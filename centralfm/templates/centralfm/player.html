<audio id="mainAudio" preload="none" crossorigin="anonymous">
    <source src="https://8036.brasilstream.com.br/stream" type="audio/mpeg">
</audio>

<script>
    const STREAM_URL = "https://8036.brasilstream.com.br/stream";
    const audio = document.getElementById('mainAudio');
    const statusTexts = document.querySelectorAll('.js-status-text');
    const playIcons = document.querySelectorAll('.js-play-icon');
    const pauseIcons = document.querySelectorAll('.js-pause-icon');
    const volFill = document.getElementById('volFill');

    // DetecГ§ГЈo robusta de iOS (iPhone, iPad, iPod)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    let isPlaying = false;
    let audioCtx = null;
    let gainNode = null;
    let currentVolume = 0.6;

    audio.volume = currentVolume;
    if (volFill) volFill.style.width = (currentVolume * 100) + '%';

    // Inicializa Web Audio API apenas no iOS, jГЎ que a propriedade .volume padrГЈo Г© bloqueada pela Apple
    function initIOSWebAudio() {
        if (!isIOS || audioCtx) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;

            audioCtx = new AudioContext();
            const source = audioCtx.createMediaElementSource(audio);
            gainNode = audioCtx.createGain();
            gainNode.gain.value = currentVolume;

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        } catch (e) {
            console.warn("Web Audio API indisponГ­vel no iOS:", e);
        }
    }

    function setVolume(vol) {
        currentVolume = Math.max(0, Math.min(1, vol));
        
        if (isIOS) {
            // No iOS controlamos o ganho de ГЎudio digitalmente via GainNode
            if (gainNode) {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                // ModificaГ§ГЈo robusta para iOS: definimos o valor diretamente alГ©m do setValueAtTime
                gainNode.gain.value = currentVolume;
                try {
                    gainNode.gain.setValueAtTime(currentVolume, audioCtx.currentTime);
                } catch (e) {}
            }
        } else {
            // Em outros dispositivos (Android/PC) usamos o controle padrГЈo de volume do HTML5
            try {
                audio.volume = currentVolume;
            } catch (e) {}
        }

        if (volFill) volFill.style.width = (currentVolume * 100) + '%';
    }

    function setAllStatus(text) {
        statusTexts.forEach(el => el.innerText = text);
    }

    function togglePlay() {
        if (!audio) return;

        if (isPlaying) {
            audio.pause();
            audio.src = ""; // Parar o download de buffer no mobile para economizar dados e bateria
            try {
                audio.load();
            } catch (e) {}
            isPlaying = false;
            updateUI(false);
        } else {
            if (isIOS) {
                initIOSWebAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            setAllStatus("Conectado");
            
            // Reatribui a URL original para forГ§ar o carregamento do ГЎudio ao vivo
            audio.src = STREAM_URL;
            audio.load();

            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updateUI(true);
                }).catch(error => {
                    console.error("Estamos com instabilidade:", error);
                    setAllStatus("Estamos com instabilidade");
                    isPlaying = false;
                    updateUI(false);
                });
            }
        }
    }

    function updateUI(playing) {
        if (playing) {
            playIcons.forEach(el => el.style.display = "none");
            pauseIcons.forEach(el => el.style.display = "block");
        } else {
            playIcons.forEach(el => el.style.display = "block");
            pauseIcons.forEach(el => el.style.display = "none");
            setAllStatus("No Ar");
        }
    }

    const volTrack = document.querySelector('.vol-track');
    if (volTrack && volFill) {
        const handleVolControl = (vol) => {
            if (isIOS) {
                initIOSWebAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
            setVolume(vol);
        };

        volTrack.addEventListener('click', (e) => {
            const rect = volTrack.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            handleVolControl(x / width);
        });

        const handleTouch = (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = volTrack.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const width = rect.width;
            handleVolControl(x / width);
        };

        volTrack.addEventListener('touchstart', handleTouch, { passive: false });
        volTrack.addEventListener('touchmove', handleTouch, { passive: false });
    }

    // VinculaГ§ГЈo programГЎtica dos botГµes de Play e Volume para iOS/Android
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
        const handlePlayClick = (e) => {
            e.preventDefault();
            togglePlay();
        };
        playBtn.addEventListener('click', handlePlayClick);
        playBtn.addEventListener('touchstart', handlePlayClick, { passive: false });
    }

    const volDownBtn = document.getElementById('volDownBtn');
    const volUpBtn = document.getElementById('volUpBtn');

    if (volDownBtn) {
        const handleVolDown = (e) => {
            e.preventDefault();
            changeVolume(-0.1);
        };
        volDownBtn.addEventListener('click', handleVolDown);
        volDownBtn.addEventListener('touchstart', handleVolDown, { passive: false });
    }

    if (volUpBtn) {
        const handleVolUp = (e) => {
            e.preventDefault();
            changeVolume(0.1);
        };
        volUpBtn.addEventListener('click', handleVolUp);
        volUpBtn.addEventListener('touchstart', handleVolUp, { passive: false });
    }

    function changeVolume(delta) {
        if (!audio) return;
        if (isIOS) {
            initIOSWebAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        setVolume(currentVolume + delta);
    }

    function normalizeRadioText(text) {
        if (!text) return "";

        const mapa = {
            '~a': 'ГЈ', '~o': 'Гµ', '~e': 'ГЄ', '~c': 'Г§', '~n': 'Г±',
            '~A': 'Гѓ', '~O': 'Г•', '~E': 'ГЉ', '~C': 'Г‡', '~N': 'Г‘',
            'Вґa': 'ГЎ', 'Вґe': 'Г©', 'Вґi': 'Г­', 'Вґo': 'Гі', 'Вґu': 'Гє',
            'ВґA': 'ГЃ', 'ВґE': 'Г‰', 'ВґI': 'ГЌ', 'ВґO': 'Г“', 'ВґU': 'Гљ',
            '\'a': 'ГЎ', '\'e': 'Г©', '\'i': 'Г­', '\'o': 'Гі', '\'u': 'Гє',
            '\'A': 'ГЃ', '\'E': 'Г‰', '\'I': 'ГЌ', '\'O': 'Г“', '\'U': 'Гљ',
            '^a': 'Гў', '^e': 'ГЄ', '^i': 'Г®', '^o': 'Гґ', '^u': 'Г»',
            '^A': 'Г‚', '^E': 'ГЉ', '^I': 'ГЋ', '^O': 'Г”', '^U': 'Г›',
            '`a': 'Г ', '`e': 'ГЁ', '`i': 'Г¬', '`o': 'ГІ', '`u': 'Г№',
            '&amp;': '&', '&#039;': "'", '&quot;': '"'
        };

        try {
            if (/[\u00c0-\u00ff]/.test(text)) {
                text = decodeURIComponent(escape(text));
            }
        } catch (e) { }

        let clean = text.trim();
        for (const [erro, acerto] of Object.entries(mapa)) {
            clean = clean.split(erro).join(acerto);
        }

        clean = clean.replace(/<[^>]*>?/gm, '');

        if (clean === clean.toUpperCase() && clean.length > 5) {
            clean = clean.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
        }

        return clean.trim();
    }

    async function updateMetadata() {
        if (!isPlaying) return;

        let nomeDaMusica = "";

        try {
            const response = await fetch('/api/musica/');
            const data = await response.json();
            if (data.musica && !data.musica.includes("Sintonize")) {
                nomeDaMusica = data.musica;
            }
        } catch (e) { }

        if (!nomeDaMusica) {
            try {
                const url = 'https://api.brasilstream.com.br/musica_agora/id:1185863148;';
                const response = await fetch(url);
                nomeDaMusica = await response.text();
            } catch (e) { }
        }

        if (isPlaying) {
            const finalNode = normalizeRadioText(nomeDaMusica);
            if (finalNode && finalNode.length > 3) {
                setAllStatus(finalNode);
            } else {
                setAllStatus("Ao Vivo");
            }
        }
    }

    async function updateProgramacao() {
        try {
            const response = await fetch('/api/programacao/');
            if (!response.ok) return;
            const data = await response.json();


            const agoraNome = document.getElementById('agora-nome');
            const agoraLocutor = document.getElementById('agora-locutor');
            const agoraFotoContainer = document.getElementById('agora-foto-container');

            if (agoraNome) agoraNome.textContent = data.agora.nome;
            if (agoraLocutor) agoraLocutor.textContent = "com " + data.agora.locutor_nome;

            if (agoraFotoContainer) {
                if (data.agora.locutor_foto) {
                    agoraFotoContainer.innerHTML = `<img src="${data.agora.locutor_foto}" alt="${data.agora.locutor_nome}" class="loc-photo" id="agora-foto-img">`;
                } else {
                    agoraFotoContainer.innerHTML = `<div class="loc-photo" id="agora-foto-fallback" style="background:#0d5c24; display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:800; font-size:42px;">C</div>`;
                }
            }


            const proxNome = document.getElementById('prox-nome');
            const proxLocutor = document.getElementById('prox-locutor');
            const proxFotoContainer = document.getElementById('prox-foto-container');
            const proxHorario = document.getElementById('prox-horario');

            if (proxNome) proxNome.textContent = data.proximo.nome;
            if (proxLocutor) proxLocutor.textContent = "com " + data.proximo.locutor_nome;
            if (proxHorario) proxHorario.textContent = data.proximo.horario;

            if (proxFotoContainer) {
                if (data.proximo.locutor_foto) {
                    proxFotoContainer.innerHTML = `<img src="${data.proximo.locutor_foto}" alt="${data.proximo.locutor_nome}" style="width:100%; height:100%; object-fit:cover;" id="prox-foto-img">`;
                } else {
                    proxFotoContainer.innerHTML = `<div id="prox-foto-fallback" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.35); font-weight:700; font-size:14px;">C</div>`;
                }
            }
        } catch (e) {
            console.warn("ProgramaГ§ГЈo em atualizaГ§ГЈo", e);
        }
    }

    setInterval(updateMetadata, 50000);
    setInterval(updateProgramacao, 60000);

    let waitingTimer = null;

    if (audio) {
        audio.onwaiting = function () {
            if (!isPlaying) return;
            waitingTimer = setTimeout(() => {
                if (isPlaying) setAllStatus("Conectado");
            }, 2500);
        };

        audio.onplaying = function () {
            if (waitingTimer) {
                clearTimeout(waitingTimer);
                waitingTimer = null;
            }
            if (isPlaying) {
                updateMetadata();
            }
        };

        audio.onerror = function () {
            if (!isPlaying) return; // Ignorar erros gerados ao esvaziar o src no pause
            if (waitingTimer) clearTimeout(waitingTimer);
            setAllStatus("Estamos com instabilidade");
            updateUI(false);
            isPlaying = false;
        };
    }
</script>
