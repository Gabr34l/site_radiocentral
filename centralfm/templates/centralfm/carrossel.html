{% load static %}
<style>
    .bottom-section {
        background: #fff;
        border-top: 1px solid #e8e8e8;
        padding: 18px 48px;
    }

    .bottom-section-wrapper {
        width: 100%;
        margin: 0 auto;
        display: flex;
        gap: 14px;
        align-items: stretch;
    }

    .carousel-container {
        flex: 1;
        overflow: hidden;
        position: relative;
    }

    .carousel-track {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;

        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    .carousel-track::-webkit-scrollbar {
        display: none;
    }

    .static-container {
        flex-shrink: 0;
        width: 280px;
    }

    .carousel-card {
        flex: 0 0 auto;
        flex-shrink: 0;
        width: calc((100% - (4 * 14px)) / 5); /* Ajuste para 5 cartas caberem perfeitamente */
        scroll-snap-align: start;
        height: 110px;
        border-radius: 16px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background-size: cover;
        background-position: center;
        text-decoration: none;
        overflow: hidden;
        position: relative;
    }

    .carousel-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .carousel-track .carousel-card::after {
        content: 'CLIQUE PARA PARTICIPAR';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8.5px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.75);
        background: rgba(0, 0, 0, 0.4);
        padding: 4px 10px;
        border-radius: 20px;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        backdrop-filter: blur(2px);
        transition: all 0.3s ease;
        pointer-events: none;
    }

    .carousel-track .carousel-card:hover::after {
        color: rgba(255, 255, 255, 1);
        background: rgba(0, 0, 0, 0.7);
        transform: translateX(-50%) scale(1.05);
    }

    .static-container .carousel-card::after {
        content: 'CLIQUE PARA ANUNCIAR';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8.5px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.75);
        background: rgba(0, 0, 0, 0.4);
        padding: 4px 10px;
        border-radius: 20px;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        backdrop-filter: blur(2px);
        transition: all 0.3s ease;
        pointer-events: none;
    }

    .static-container .carousel-card:hover::after {
        color: rgba(255, 255, 255, 1);
        background: rgba(0, 0, 0, 0.8);
        transform: translateX(-50%) scale(1.05);
    }

    .carousel-card.verde {
        background: linear-gradient(135deg, #0d5c24 0%, #1a8c38 100%);
        color: #facc15;
        box-shadow: 0 4px 15px rgba(13, 92, 36, 0.2);
        line-height: 1.4;
    }

    .carousel-card.anuncio {
        background: #fafafa;
        border: 1.5px dashed #e0e0e0;
        color: #888;
    }

    @media (max-width: 1366px) and (min-width: 961px) {
        .carousel-card {
            width: calc((100% - (2 * 14px)) / 3); /* Ajuste para 3 cartas caberem perfeitamente */
            height: 100px;
        }

        .static-container {
            width: 280px;
        }

        .bottom-section {
            padding: 18px 20px;
        }
    }

    @media (max-width: 960px) {
        .bottom-section {
            padding: 24px 20px;
        }

        .bottom-section-wrapper {
            flex-direction: column;
            gap: 20px;
        }

        .static-container {
            width: 100%;
        }

        .carousel-track {
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            height: 320px;
            scroll-snap-type: y mandatory;
        }

        .carousel-card {
            width: 100%;
            min-width: 100%;
            min-height: 140px;
            height: 140px;
            flex-shrink: 0;
        }
    }

    @media (max-width: 640px) {
        .bottom-section {
            padding: 24px 16px;
        }

        .bottom-section-wrapper {
            gap: 14px;
        }
    }
</style>

<div class="bottom-section">
    <div class="bottom-section-wrapper">
        <div class="carousel-container">
            <div class="carousel-track" id="promoCarousel">
                {% for promocao in promocoes %}
                <a href="{{ promocao.link_whatsapp|default:'#' }}"
                    target="_blank"
                    class="carousel-card"
                    title="{{ promocao.titulo }}"
                    {% if promocao.imagem_banner %}
                    style="background-image: url('{{ promocao.imagem_banner.url }}');"
                    {% else %}
                    style="background: linear-gradient(135deg, #0d5c24 0%, #1a8c38 100%);"
                    {% endif %}
                ></a>
                {% empty %}
                {# Fallback: nenhuma promoção ativa no banco de dados #}
                <div class="carousel-card" style="background: linear-gradient(135deg, #0d5c24 0%, #1a8c38 100%); justify-content: center; color: #facc15; font-size: 13px; text-align: center; padding: 12px;">
                    Nenhuma promoção ativa no momento.
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="static-container">
            <a href="https://wa.me/5534999733397?text=Olá,%20gostaria%20de%20anunciar%20na%20Rádio%20Central!"
                target="_blank" class="carousel-card"
                style="background-image: url('{% get_static_prefix %}Promocao/anuncie_aqui.png'); width: 100%; min-width: 0; box-shadow: none;"></a>
        </div>
    </div>
</div>

<script>
    const carouselBar = document.getElementById('promoCarousel');
    if (carouselBar) {
        // Clone all cards and append to create seamless infinite loop
        const originalCards = Array.from(carouselBar.querySelectorAll('.carousel-card'));
        originalCards.forEach(card => {
            const clone = card.cloneNode(true);
            clone.setAttribute('aria-hidden', 'true');
            carouselBar.appendChild(clone);
        });

        const isVertical = () => window.innerWidth <= 960;

        const cardStep = () => {
            const first = carouselBar.querySelector('.carousel-card');
            return first ? (isVertical() ? first.offsetHeight + 14 : first.offsetWidth + 14) : 0;
        };

        const totalOriginalSize = () => cardStep() * originalCards.length;

        let isScrolling = false;

        setInterval(() => {
            if (isScrolling) return;

            const step = cardStep();
            if (!step) return;

            isScrolling = true;
            
            if (isVertical()) {
                carouselBar.scrollBy({ top: step, behavior: 'smooth' });
            } else {
                carouselBar.scrollBy({ left: step, behavior: 'smooth' });
            }

            setTimeout(() => {
                // If we've scrolled into the cloned section, silently jump back
                if (isVertical()) {
                    if (carouselBar.scrollTop >= totalOriginalSize() - 2) {
                        carouselBar.style.scrollBehavior = 'auto';
                        carouselBar.scrollTop -= totalOriginalSize();
                        carouselBar.style.scrollBehavior = '';
                    }
                } else {
                    if (carouselBar.scrollLeft >= totalOriginalSize() - 2) {
                        carouselBar.style.scrollBehavior = 'auto';
                        carouselBar.scrollLeft -= totalOriginalSize();
                        carouselBar.style.scrollBehavior = '';
                    }
                }
                isScrolling = false;
            }, 700);
        }, 3500);
    }
</script>
