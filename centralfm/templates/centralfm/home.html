<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central FM 101.1 — Tá na Central, Tá Legal!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'Logo/logo.png' %}">

    <style>
        :root {
            --hero-bg: #0e6e2a;
            --hero-grad: linear-gradient(135deg, #0a5a22 0%, #0e6e2a 50%, #1a8c38 100%);
            --accent: #facc15;
            --accent-glow: 0 4px 24px rgba(250, 204, 21, 0.40);
            --border-white: rgba(255, 255, 255, 0.10);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --bg-bottom: #ffffff;
            --border-bottom: #e8e8e8;
            --footer-bg: #0a3d1a;
            --footer-text: rgba(255, 255, 255, 0.30);
            --amarelo: #facc15;
            --verdao: #0d5c24;
            --verde-escuro: #0a3d1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--footer-bg);
            color: #1a1a1a;
            overflow-x: hidden;
            min-width: 240px;
        }

        h1,
        h2,
        h3,
        h4 {
            letter-spacing: -0.5px;
        }

        html,
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
            min-width: 240px;
        }

        ::-webkit-scrollbar {
            display: none;
        }


        a,
        button {
            transition: all 0.2s ease;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
        }

        .bottom-green-container {
            background: linear-gradient(to bottom, #0d5c24 0%, #051f0b 100%);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .bottom-green-container::before,
        .bottom-green-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .bottom-green-container::before {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1440 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,180 C200,120 400,240 600,180 C800,120 1000,240 1200,180 C1320,150 1400,170 1440,165' stroke='rgba(255,255,255,0.045)' stroke-width='2.5' fill='none'/%3E%3Cpath d='M0,280 C250,220 500,340 750,280 C900,240 1100,320 1440,270' stroke='rgba(255,255,255,0.03)' stroke-width='2' fill='none'/%3E%3Cpath d='M0,350 C300,290 600,400 900,340 C1100,300 1300,360 1440,340' stroke='rgba(255,255,255,0.025)' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            transform-origin: center center;
            animation: audioPulse 6s ease-in-out infinite;
        }

        .bottom-green-container::after {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1440 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,220 C350,160 700,300 1050,220 C1200,185 1350,210 1440,200' stroke='rgba(255,255,255,0.025)' stroke-width='2' fill='none'/%3E%3Cpath d='M0,320 C200,270 500,370 800,310 C1050,265 1250,330 1440,300' stroke='rgba(255,255,255,0.02)' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            transform-origin: center center;
            animation: audioPulse 4.5s ease-in-out infinite reverse;
        }

        .bottom-green-container .winners-section,
        .bottom-green-container .footer {
            position: relative;
            z-index: 2;
        }

        @keyframes audioPulse {
            0%, 100% {
                transform: scale(1.1) translateY(0) scaleY(1);
                opacity: 0.8;
            }
            25% {
                transform: scale(1.1) translateY(-1%) scaleY(1.15);
                opacity: 1;
            }
            50% {
                transform: scale(1.1) translateY(1%) scaleY(0.95);
                opacity: 0.9;
            }
            75% {
                transform: scale(1.1) translateY(-0.5%) scaleY(1.25);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        {% include 'centralfm/hero.html' %}
        {% include 'centralfm/carrossel.html' %}
        <div class="bottom-green-container">
            {% include 'centralfm/ganhadores.html' %}
            {% include 'centralfm/footer.html' %}
        </div>
    </div>

    {% include 'centralfm/player.html' %}

</body>

</html>
